<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FFF8F0">
  <title>🥟 妈妈的饺子</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFF8F0;
      --card: #FFFFFF;
      --primary: #E67E22;
      --primary-dark: #D35400;
      --success: #27AE60;
      --deliver: #2980B9;
      --danger: #E74C3C;
      --text: #2C3E50;
      --text-light: #7F8C8D;
      --border: #E8D5C4;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh; min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    .app { max-width: 480px; margin: 0 auto; padding: 16px 16px 120px; }

    .header { text-align: center; padding: 24px 0 8px; }
    .header h1 { font-size: 28px; font-weight: 700; }
    .header .sub { font-size: 14px; color: var(--text-light); margin-top: 4px; }

    .tabs { display: flex; gap: 6px; margin: 16px 0; background: var(--card); border-radius: var(--radius); padding: 4px; box-shadow: var(--shadow); }
    .tab { flex: 1; padding: 11px 6px; border: none; background: transparent; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; color: var(--text-light); transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 3px; position: relative; }
    .tab.active { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(230,126,34,0.3); }
    .badge { background: var(--danger); color: #fff; font-size: 12px; min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 0 6px; font-weight: 700; position: absolute; top: -6px; right: -6px; }
    .tab.active .badge { background: #fff; color: var(--primary); }

    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .input { width: 100%; padding: 14px 16px; font-size: 18px; border: 2px solid var(--border); border-radius: var(--radius); background: var(--card); color: var(--text); transition: border-color 0.2s; -webkit-appearance: none; }
    .input:focus { outline: none; border-color: var(--primary); }
    .input::placeholder { color: #C0B5A8; }

    .pill-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill { padding: 10px 16px; font-size: 16px; border: 2px solid var(--border); border-radius: 50px; background: var(--card); color: var(--text); cursor: pointer; transition: all 0.15s; font-weight: 500; }
    .pill:active { transform: scale(0.96); }
    .pill.selected { background: var(--primary); color: #fff; border-color: var(--primary); }

    .toggle-row { display: flex; gap: 10px; }
    .toggle-btn { flex: 1; padding: 16px; font-size: 18px; border: 2px solid var(--border); border-radius: var(--radius); background: var(--card); cursor: pointer; font-weight: 600; text-align: center; transition: all 0.15s; }
    .toggle-btn.selected { background: var(--primary); color: #fff; border-color: var(--primary); }

    .btn-submit { width: 100%; padding: 18px; font-size: 20px; font-weight: 700; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; box-shadow: 0 4px 16px rgba(230,126,34,0.3); letter-spacing: 1px; margin-top: 8px; }
    .btn-submit:active { transform: scale(0.98); opacity: 0.9; }
    .btn-submit:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

    .success-screen { text-align: center; padding: 60px 20px; }
    .success-screen .emoji { font-size: 80px; margin-bottom: 20px; }
    .success-screen h2 { font-size: 24px; margin-bottom: 8px; color: var(--success); }
    .success-screen p { font-size: 16px; color: var(--text-light); margin-bottom: 32px; line-height: 1.6; }
    .btn-new-order { padding: 14px 32px; font-size: 18px; font-weight: 700; background: var(--primary); color: #fff; border: none; border-radius: 50px; cursor: pointer; }

    .date-nav { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px; }
    .date-nav-arrow { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); background: var(--card); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); }
    .date-nav-arrow:active { background: #f0f0f0; }
    .date-nav-label { font-size: 17px; font-weight: 700; min-width: 130px; text-align: center; }
    .date-nav-today { font-size: 13px; color: var(--primary); font-weight: 600; cursor: pointer; text-decoration: underline; }

    /* ── Summary ── */
    .summary-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 16px; }
    .summary-toggle { width: 100%; background: none; border: none; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: var(--text); padding: 0; }
    .summary-toggle .arrow { transition: transform 0.2s; font-size: 14px; }
    .summary-toggle.open .arrow { transform: rotate(180deg); }
    .summary-body { margin-top: 12px; display: none; }
    .summary-body.open { display: block; }
    .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f0eb; font-size: 15px; }
    .summary-row:last-child { border-bottom: none; }
    .summary-row .label { color: var(--text-light); }
    .summary-row .value { font-weight: 700; color: var(--text); }
    .summary-row .value.highlight { color: var(--primary-dark); font-size: 18px; }
    .summary-row .value.dumplings { color: #E67E22; }
    .summary-divider { border-top: 2px dashed var(--border); margin: 8px 0; padding-top: 8px; }
    .summary-filling-row { display: flex; justify-content: space-between; font-size: 14px; padding: 3px 0; color: var(--text-light); }
    .summary-filling-row .count { font-weight: 600; color: var(--text); }

    .stats-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .stat-card { flex: 1; background: var(--card); border-radius: var(--radius); padding: 14px 10px; text-align: center; box-shadow: var(--shadow); }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--primary-dark); }
    .stat-label { font-size: 13px; color: var(--text-light); margin-top: 2px; }
    .stat-card.pending .stat-value { color: #E67E22; }
    .stat-card.done .stat-value { color: #27AE60; }
    .stat-card.delivered .stat-value { color: #2980B9; }
    .stat-card.total .stat-value { color: var(--text); }

    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; margin-top: 4px; }
    .section-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .section-count { font-size: 14px; color: var(--text-light); font-weight: 500; }
    .btn-text { background: none; border: none; font-size: 14px; color: var(--text-light); cursor: pointer; padding: 4px 8px; text-decoration: underline; }
    .btn-text.danger { color: var(--danger); }

    .order-list { display: flex; flex-direction: column; gap: 10px; }
    .order-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); border-left: 4px solid transparent; cursor: pointer; transition: all 0.2s; }
    .order-card.pending { border-left-color: #E67E22; }
    .order-card.done { border-left-color: #27AE60; }
    .order-card.delivered { border-left-color: #2980B9; }
    .order-card.delivered.paid-done { opacity: 0.65; }
    .order-card.delivered.paid-done .order-filling,
    .order-card.delivered.paid-done .order-name { text-decoration: line-through; text-decoration-thickness: 2px; text-decoration-color: #ccc; }
    .order-card:active { transform: scale(0.99); }

    .order-row1 { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .order-name { font-size: 18px; font-weight: 700; }
    .order-date { font-size: 12px; color: var(--text-light); white-space: nowrap; margin-left: 8px; }
    .order-row2 { font-size: 16px; margin-bottom: 4px; }
    .order-filling { font-weight: 600; }
    .order-weight { color: var(--primary-dark); font-weight: 700; }
    .order-type { display: inline-block; font-size: 13px; padding: 2px 8px; border-radius: 4px; font-weight: 600; margin-left: 6px; }
    .order-type.cooked { background: #FFF3E0; color: #E67E22; }
    .order-type.raw { background: #E3F2FD; color: #1976D2; }
    .order-notes { font-size: 13px; color: var(--text-light); margin-top: 4px; font-style: italic; }
    .order-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; flex-wrap: wrap; }
    .btn-done { padding: 10px 18px; font-size: 15px; font-weight: 700; background: var(--success); color: #fff; border: none; border-radius: 50px; cursor: pointer; }
    .btn-done:active { opacity: 0.8; }
    .btn-deliver { padding: 10px 18px; font-size: 15px; font-weight: 700; background: var(--deliver); color: #fff; border: none; border-radius: 50px; cursor: pointer; }
    .btn-deliver:active { opacity: 0.8; }
    .btn-delete { padding: 10px 16px; font-size: 15px; font-weight: 600; background: #fff; color: var(--danger); border: 2px solid var(--danger); border-radius: 50px; cursor: pointer; }
    .btn-delete:active { background: #FFF5F5; }
    .btn-undo { padding: 10px 16px; font-size: 15px; font-weight: 600; background: #fff; color: #E67E22; border: 2px solid #E67E22; border-radius: 50px; cursor: pointer; }
    .btn-undo:active { background: #FFF8F0; }
    .btn-pay { padding: 10px 14px; font-size: 15px; font-weight: 700; background: #F39C12; color: #fff; border: none; border-radius: 50px; cursor: pointer; }
    .btn-pay:active { opacity: 0.8; }
    .btn-pay.paid { background: #27AE60; }
    .paid-badge { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 4px; font-weight: 600; margin-left: 6px; }
    .paid-badge.yes { background: #D5F5E3; color: #27AE60; }
    .paid-badge.no { background: #FADBD8; color: #E74C3C; }
    .qty-badge { display: inline-block; background: #E74C3C; color: #fff; font-size: 13px; padding: 3px 10px; border-radius: 50px; font-weight: 700; margin-left: 6px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }

    /* ── Summary filling detail ── */
    .filling-detail { display: none; padding-left: 12px; margin-top: 2px; }
    .filling-detail.open { display: block; }
    .filling-detail-row { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; color: var(--text-light); }
    .filling-detail-row .customer { font-weight: 500; color: var(--text); }
    .filling-detail-row .dots { color: #CCC; margin: 0 6px; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .empty-state .emoji { font-size: 64px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 15px; line-height: 1.5; }

    .conn-status { position: fixed; top: 12px; right: 12px; font-size: 12px; padding: 4px 10px; border-radius: 50px; font-weight: 600; z-index: 100; }
    .conn-status.online { background: #D5F5E3; color: #27AE60; }
    .conn-status.offline { background: #FADBD8; color: #E74C3C; }

    .toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; width: calc(100% - 32px); max-width: 450px; }
    .toast { background: #2C3E50; color: #fff; padding: 14px 20px; border-radius: 50px; font-size: 15px; font-weight: 600; pointer-events: auto; animation: toastIn 0.3s ease-out; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .toast.leaving { animation: toastOut 0.3s ease-in forwards; }

    @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(20px); } }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; display: flex; align-items: center; justify-content: center; }
    .dialog { background: var(--card); border-radius: 16px; padding: 24px; margin: 24px; text-align: center; max-width: 320px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
    .dialog h3 { font-size: 18px; margin-bottom: 8px; }
    .dialog p { font-size: 14px; color: var(--text-light); margin-bottom: 20px; }
    .dialog-btns { display: flex; gap: 10px; }
    .dialog-btns button { flex: 1; padding: 12px; font-size: 16px; font-weight: 700; border-radius: 8px; cursor: pointer; border: none; }
    .btn-cancel { background: #f0f0f0; color: var(--text); }
    .btn-confirm { background: var(--danger); color: #fff; }

    /* ── PIN Lock ── */
    .pin-screen { text-align: center; padding: 80px 20px 40px; }
    .pin-screen .emoji { font-size: 64px; margin-bottom: 16px; }
    .pin-screen h2 { font-size: 22px; margin-bottom: 8px; }
    .pin-screen p { font-size: 14px; color: var(--text-light); margin-bottom: 24px; }
    .pin-dots { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; }
    .pin-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); background: var(--card); transition: all 0.15s; box-shadow: var(--shadow); }
    .pin-dot.filled { background: var(--primary); border-color: var(--primary); }
    .pin-dot.wrong { background: var(--danger); border-color: var(--danger); animation: shake 0.4s; }
    .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; margin: 0 auto; }
    .pin-key { aspect-ratio: 1; border-radius: 50%; border: 2px solid var(--border); background: var(--card); font-size: 24px; font-weight: 600; cursor: pointer; color: var(--text); box-shadow: var(--shadow); }
    .pin-key:active { background: #f0f0f0; transform: scale(0.95); }
    .pin-key.delete { font-size: 16px; font-weight: 500; }
    .pin-back { display: block; margin: 24px auto 0; background: none; border: none; color: var(--text-light); font-size: 14px; cursor: pointer; text-decoration: underline; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  </style>
</head>
<body>

  <!-- ━━ 顾客下单页面 ━━ -->
  <div id="customerApp" class="app">
    <div id="customerForm">
      <div class="header">
        <h1>🥟 妈妈的饺子</h1>
        <div class="sub">现包现煮</div>
      </div>

      <div class="form-group">
        <label class="form-label">👤 您的称呼</label>
        <input class="input" type="text" id="customerName" placeholder="微信名或门牌号…" autocomplete="off">
      </div>

      <div class="form-group">
        <label class="form-label">📅 哪天要</label>
        <div class="toggle-row">
          <button class="toggle-btn selected" id="btnDay1" onclick="setDeliveryDay(0)"></button>
          <button class="toggle-btn" id="btnDay2" onclick="setDeliveryDay(1)"></button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">🥩 饺子馅</label>
        <div class="pill-grid" id="fillingPills"></div>
      </div>

      <div class="form-group">
        <label class="form-label">📦 份量</label>
        <div class="toggle-row">
          <button class="toggle-btn selected" id="btnLarge" onclick="setPortion('large')">🥟 大份（15个）</button>
          <button class="toggle-btn" id="btnSmall" onclick="setPortion('small')">🫓 小份（12个）</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">🔢 数量</label>
        <div class="weight-row">
          <button class="weight-btn" onclick="adjustQty(-1)">−</button>
          <span class="weight-display" id="qtyDisplay">1</span>
          <span class="weight-unit">份</span>
          <button class="weight-btn" onclick="adjustQty(1)">+</button>
        </div>
        <div class="weight-quicks">
          <button class="weight-quick" onclick="setQty(1)">1份</button>
          <button class="weight-quick" onclick="setQty(2)">2份</button>
          <button class="weight-quick" onclick="setQty(3)">3份</button>
          <button class="weight-quick" onclick="setQty(5)">5份</button>
          <button class="weight-quick" onclick="setQty(10)">10份</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">🍳 煮熟还是生的</label>
        <div class="toggle-row">
          <button class="toggle-btn selected" id="btnCooked" onclick="setCookType('cooked')">🔥 煮好的</button>
          <button class="toggle-btn" id="btnRaw" onclick="setCookType('raw')">❄️ 生的带走</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">📝 备注（选填）</label>
        <input class="input" type="text" id="notes" placeholder="少盐、多姜、不要香菜…" autocomplete="off">
      </div>

      <button class="btn-submit" onclick="customerSubmit()">提交订单 🥟</button>

      <div style="text-align:center;margin-top:24px;">
        <button class="btn-text" onclick="showCustomerHistory()">📋 查看我的历史订单</button>
      </div>
    </div>

    <div id="successScreen" class="success-screen" style="display:none">
      <div class="emoji">✅</div>
      <h2>下单成功！</h2>
      <p id="successMsg">已经通知老板啦<br>饺子正在包，一会儿就好 🥟</p>
      <button class="btn-new-order" onclick="resetCustomerForm()">再来一单</button>
    </div>

    <!-- 顾客历史订单 -->
    <div id="historyScreen" style="display:none">
      <div class="header">
        <h1>📋 我的订单</h1>
        <div class="sub" id="historyTitle"></div>
      </div>
      <div class="order-list" id="historyList"></div>
      <div class="empty-state" id="historyEmpty" style="display:none">
        <div class="emoji">🔍</div>
        <h3>没有找到订单</h3>
        <p>换个名字试试</p>
      </div>
      <div style="text-align:center;margin-top:24px;">
        <button class="btn-new-order" onclick="document.getElementById('historyScreen').style.display='none';document.getElementById('customerForm').style.display='';">← 返回下单</button>
      </div>
    </div>
  </div>

  <!-- ━━ 店主接单面板 ━━ -->
  <div id="adminApp" class="app" style="display:none">

    <!-- PIN 锁屏 -->
    <div id="pinScreen" class="pin-screen">
      <div class="emoji">🔐</div>
      <h2>店主密码</h2>
      <p>输入密码查看订单</p>
      <div class="pin-dots" id="pinDots">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>
      <div class="pin-keypad">
        <button class="pin-key" onclick="pinPress('1')">1</button>
        <button class="pin-key" onclick="pinPress('2')">2</button>
        <button class="pin-key" onclick="pinPress('3')">3</button>
        <button class="pin-key" onclick="pinPress('4')">4</button>
        <button class="pin-key" onclick="pinPress('5')">5</button>
        <button class="pin-key" onclick="pinPress('6')">6</button>
        <button class="pin-key" onclick="pinPress('7')">7</button>
        <button class="pin-key" onclick="pinPress('8')">8</button>
        <button class="pin-key" onclick="pinPress('9')">9</button>
        <button class="pin-key" onclick="pinPress('')" style="visibility:hidden"></button>
        <button class="pin-key" onclick="pinPress('0')">0</button>
        <button class="pin-key delete" onclick="pinDelete()">⌫</button>
      </div>
      <button class="pin-back" onclick="window.location.href='index.html'">← 回到顾客页面</button>
    </div>

    <!-- 面板内容 -->
    <div id="adminContent" style="display:none">
    <div class="conn-status offline" id="connStatus">⏳ 连接中…</div>

    <div class="header">
      <h1>🥟 饺子订单本</h1>
      <div class="sub">实时接单面板</div>
    </div>

    <div class="date-nav">
      <button class="date-nav-arrow" onclick="goDate(-1)">◀</button>
      <span class="date-nav-label" id="dateLabel">今天</span>
      <button class="date-nav-arrow" onclick="goDate(1)">▶</button>
    </div>
    <div style="text-align:center;margin-bottom:12px;">
      <button class="date-nav-today" onclick="goToday()">回到今天</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="pending" onclick="adminSwitchTab('pending')">
        待做 <span class="badge" id="adminBadge" style="display:none">0</span>
      </button>
      <button class="tab" data-tab="done" onclick="adminSwitchTab('done')">
        已做好
      </button>
      <button class="tab" data-tab="delivered" onclick="adminSwitchTab('delivered')">
        已送达
      </button>
    </div>

    <div class="stats-bar">
      <div class="stat-card total"><div class="stat-value" id="statTotal">-</div><div class="stat-label">当天订单</div></div>
      <div class="stat-card pending"><div class="stat-value" id="statPending">-</div><div class="stat-label">待做</div></div>
      <div class="stat-card done"><div class="stat-value" id="statDone">-</div><div class="stat-label">已做好</div></div>
      <div class="stat-card delivered"><div class="stat-value" id="statDelivered">-</div><div class="stat-label">已送达</div></div>
    </div>

    <!-- 今日统计 -->
    <div class="summary-card">
      <button class="summary-toggle" onclick="toggleSummary()">
        <span>📊 今日统计</span>
        <span class="arrow">▼</span>
      </button>
      <div class="summary-body" id="summaryBody">
        <div class="summary-row">

function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function dateStr(d) { return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function dateLabel(d) {
  var today = dateStr(new Date());
  var yesterday = dateStr(new Date(Date.now()-86400000));
  var tomorrow = dateStr(new Date(Date.now()+86400000));
  var ds = dateStr(d);
  if (ds === today) return '今天';
  if (ds === yesterday) return '昨天';
  if (ds === tomorrow) return '明天';
  return (d.getMonth()+1)+'月'+d.getDate()+'日';
}
function timeAgo(iso) {
  var diff = Math.floor((Date.now() - new Date(iso).getTime())/60000);
  if (diff < 1) return '刚刚';
  if (diff < 60) return diff+'分钟前';
  var h = Math.floor(diff/60);
  if (h < 24) return h+'小时前';
  var d = new Date(iso);
  return (d.getMonth()+1)+'-'+d.getDate()+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}
function showToast(msg) {
  var c = document.getElementById('toastContainer');
  var t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;

}

async function customerSubmit() {
  var name = document.getElementById('customerName').value.trim();

  try {
    var resp = await fetch(API, { method:'POST', headers:HEADERS, body: JSON.stringify({
      customer_name:name, delivery_date:dd, filling:filling,
      portion:portion, qty:qty, type:type, notes:notes, status:'pending'

    console.error(e); showToast('提交失败，请检查网络后重试');
    btn.disabled = false; btn.textContent = '提交订单 🥟'; return;

function renderSection(listId, emptyId, orders, btnId) {

  }
}

function computeSummary() {
  var total = allOrders.length;
  var revenue = 0, dumplings = 0, cooked = 0, raw = 0, large = 0, small = 0, collected = 0, paidRevenue = 0;
  var fillingMap = {}; // filling -> [orders]

  for (var i = 0; i < allOrders.length; i++) {
    var o = allOrders[i];
    var qty = o.qty || 1;
    var p = (o.portion === 'small' ? 12 : 15) * qty;
    dumplings += p;
    if (o.portion === 'large') large += qty; else small += qty;
    if (o.type === 'cooked') cooked += qty; else raw += qty;

    var price = ((PRICES[o.filling] && PRICES[o.filling][o.portion]) ? PRICES[o.filling][o.portion] : 0) * qty;
    revenue += price;
    if (o.status === 'done' || o.status === 'delivered') collected += price;
    if (o.paid) paidRevenue += price;

    if (!fillingMap[o.filling]) fillingMap[o.filling] = { totalQty: 0, totalPrice: 0, orders: [] };
    fillingMap[o.filling].totalQty += qty;
    fillingMap[o.filling].totalPrice += price;
    fillingMap[o.filling].orders.push(o);
  }

  document.getElementById('sumOrders').textContent = total + ' 单';
  document.getElementById('sumRevenue').textContent = '¥' + revenue;
  document.getElementById('sumDumplings').textContent = dumplings + ' 个';
  document.getElementById('sumCookType').textContent = cooked + ' / ' + raw;
  document.getElementById('sumPortion').textContent = large + ' / ' + small;
  document.getElementById('sumCollected').textContent = '¥' + collected + ' 应收';

  // Filling breakdown - clickable to show customers
  var keys = Object.keys(fillingMap).sort(function(a,b){ return fillingMap[b].orders.length - fillingMap[a].orders.length; });
  var html = '';
  for (var k = 0; k < keys.length; k++) {
    var filling = keys[k];
    var data = fillingMap[filling];
    html += '<div class="summary-filling-row" onclick="toggleFillingDetail(\''+k+'\')" style="cursor:pointer;">'+
      '<span>▶ '+filling+'</span><span class="count">'+data.orders.length+' 单 · '+data.totalQty+'份 · ¥'+data.totalPrice+'</span></div>'+
      '<div class="filling-detail filling-detail-'+k+'">';
    for (var m = 0; m < data.orders.length; m++) {
      var ord = orders[m];
      var oqty = ord.qty || 1;
      var ps = ((PRICES[ord.filling] && PRICES[ord.filling][ord.portion]) ? PRICES[ord.filling][ord.portion] : 0) * oqty;
      html += '<div class="filling-detail-row">'+
        '<span><span class="customer">'+escapeHtml(ord.customer_name)+'</span>'+
        '<span class="dots"> · </span>'+ (ord.portion==='small'?'小份(12个)':'大份(15个)') + (oqty>1?' ×'+oqty:'') +
        '<span class="dots"> · </span>¥'+ps+'</span>'+
        '<span style="font-size:11px;'+(ord.paid?'color:#27AE60;':'color:#E74C3C;')+'">'+(ord.paid?'已收':'未收')+'</span>'+
      '</div>';
    }
    html += '</div>';
  }
  document.getElementById('sumFillings').innerHTML = html || '<div class="summary-filling-row"><span>暂无</span></div>';
}

function toggleSummary() {

function toggleFillingDetail(idx) {
  var detail = document.querySelector('.filling-detail-'+idx);

  if (detail.classList.contains('open')) {
    row.innerHTML = row.innerHTML.replace('▶','▼');
  } else {
    row.innerHTML = row.innerHTML.replace('▼','▶');
  }
}

function renderOrderCard(order) {
  var st = order.status;
  var cls = st==='pending'?'pending':(st==='done'?'done':('delivered'+(order.paid?' paid-done':'')));
  var tc = order.type==='cooked'?'cooked':'raw';
  var tl = order.type==='cooked'?'🔥 煮熟':'❄️ 生的';
  var qty = order.qty || 1;
  var qtyBadge = qty > 1 ? '<span class="qty-badge">×'+qty+'</span>' : '';
  var pl = (order.portion==='small'?'小份(12个)':'大份(15个)') + qtyBadge;
  var dl = dateLabel(new Date(order.delivery_date+'T00:00:00'));
  var paid = order.paid === true;
  var paidBadge = '<span class="paid-badge '+(paid?'yes':'no')+'">'+(paid?'💰 已收':'💸 未收')+'</span>';

  var acts = '';
  if (st === 'pending') {
    acts = '<button class="btn-done" onclick="event.stopPropagation();adminMark(\''+order.id+'\',\'done\')">✓ 做好了</button>'+
           '<button class="btn-pay '+(paid?'paid':'')+'" onclick="event.stopPropagation();adminTogglePaid(\''+order.id+'\')">💰 '+(paid?'已收':'未收')+'</button>'+
           '<button class="btn-delete" onclick="event.stopPropagation();adminConfirmDelete(\''+order.id+'\')">🗑</button>';
  } else if (st === 'done') {
    acts = '<button class="btn-deliver" onclick="event.stopPropagation();adminMark(\''+order.id+'\',\'delivered\')">🚀 已送达</button>'+
           '<button class="btn-pay '+(paid?'paid':'')+'" onclick="event.stopPropagation();adminTogglePaid(\''+order.id+'\')">💰 '+(paid?'已收':'未收')+'</button>'+
           '<button class="btn-undo" onclick="event.stopPropagation();adminMark(\''+order.id+'\',\'pending\')">↩ 退回</button>'+
           '<button class="btn-delete" onclick="event.stopPropagation();adminConfirmDelete(\''+order.id+'\')">🗑</button>';
  } else { // delivered
    acts = '<button class="btn-pay '+(paid?'paid':'')+'" onclick="event.stopPropagation();adminTogglePaid(\''+order.id+'\')">💰 '+(paid?'已收':'未收')+'</button>'+
           '<button class="btn-undo" onclick="event.stopPropagation();adminMark(\''+order.id+'\',\'done\')">↩ 退回</button>'+
           '<button class="btn-delete" onclick="event.stopPropagation();adminConfirmDelete(\''+order.id+'\')">🗑</button>';
  }

  return '<div class="order-card '+cls+'" data-id="'+order.id+'">'+
    '<div class="order-row1">'+
      '<span class="order-name">'+escapeHtml(order.customer_name)+paidBadge+'</span>'+
      '<span class="order-date">📅 '+dl+' · '+timeAgo(order.created_at)+'</span>'+
    '</div>'+
    '<div class="order-row2">'+
      '<span class="order-filling">'+escapeHtml(order.filling)+'</span>'+
      ' <span class="order-weight">'+pl+'</span>'+
      '<span class="order-type '+tc+'">'+tl+'</span>'+
    '</div>'+
    (order.notes?'<div class="order-notes">'+escapeHtml(order.notes)+'</div>':'')+
    (order.done_at&&st!=='pending'?'<div style="font-size:12px;color:var(--text-light);margin-top:4px;">✅ '+timeAgo(order.done_at)+(st==='done'?'做好':'')+'</div>':'')+
    (order.delivered_at&&st==='delivered'?'<div style="font-size:12px;color:var(--deliver);margin-top:4px;">🚀 '+timeAgo(order.delivered_at)+'送达</div>':'')+
    '<div class="order-actions">'+acts+'</div>'+
  '</div>';
}

function adminSwitchTab(tab) {
  curTab = tab;
  var ts = document.querySelectorAll('#adminApp .tab');
  for (var i=0;i<ts.length;i++) ts[i].classList.remove('active');
  document.querySelector('#adminApp .tab[data-tab="'+tab+'"]').classList.add('active');
  document.getElementById('pendingSection').style.display = tab==='pending'?'':'none';
  document.getElementById('doneSection').style.display = tab==='done'?'':'none';
  document.getElementById('deliveredSection').style.display = tab==='delivered'?'':'none';
}

async function adminTogglePaid(id) {
  var o = findOrder(id); if (!o) return;
  var newPaid = !o.paid;
  var oq = o.qty || 1;
  var price = ((PRICES[o.filling] && PRICES[o.filling][o.portion]) ? PRICES[o.filling][o.portion] : 0) * oq;
  try {
    var resp = await fetch(API+'?id=eq.'+encodeURIComponent(id), { method:'PATCH', headers:HEADERS, body:JSON.stringify({paid:newPaid}) });
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    await loadOrders();
    showToast(newPaid ? '💰 已收款 ¥'+price+' — '+o.customer_name+' · '+o.filling : '⏳ 标记为未收');
  } catch(e) { console.error(e); showToast('操作失败'); }
}

async function adminMark(id, newStatus) {
  var now = new Date().toISOString();
  var body = { status: newStatus };
  if (newStatus === 'done') body.done_at = now;
  else if (newStatus === 'delivered') body.delivered_at = now;
  else { body.done_at = null; body.delivered_at = null; }

  try {
    var resp = await fetch(API+'?id=eq.'+encodeURIComponent(id), { method:'PATCH', headers:HEADERS, body:JSON.stringify(body) });
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    await loadOrders();
    // 自动切到对应 tab
    var tabName = newStatus === 'done' ? 'done' : (newStatus === 'delivered' ? 'delivered' : 'pending');
    adminSwitchTab(tabName);
    showToast(newStatus==='done'?'✅ 做好了！':(newStatus==='delivered'?'🚀 已送达！':'↩ 已退回'));
  } catch(e) { console.error(e); showToast('操作失败'); }
}

function findOrder(id) {
  for (var i=0;i<allOrders.length;i++) if (allOrders[i].id===id) return allOrders[i];
  return null;
}

function adminConfirmDelete(id) {
  var o = findOrder(id); if (!o) return;
  var ov = document.createElement('div'); ov.className = 'overlay';
  var oq = o.qty || 1;
  ov.innerHTML = '<div class="dialog"><h3>确认删除？</h3><p>'+escapeHtml(o.customer_name)+' · '+escapeHtml(o.filling)+' · '+(o.portion==='small'?'小份(12个)':'大份(15个)')+(oq>1?' ×'+oq:'')+'</p>'+
    '<div class="dialog-btns"><button class="btn-cancel">取消</button><button class="btn-confirm">删除</button></div></div>';
  document.body.appendChild(ov);
  ov.querySelector('.btn-cancel').onclick = function(){ ov.remove(); };
  ov.querySelector('.btn-confirm').onclick = async function(){
    ov.remove();
    try { await fetch(API+'?id=eq.'+encodeURIComponent(id),{method:'DELETE',headers:HEADERS}); await loadOrders(); showToast('🗑 已删除'); }
    catch(e){ console.error(e); showToast('删除失败'); }
  };
  ov.addEventListener('click',function(e){ if(e.target===ov) ov.remove(); });
}

async function completeAll() {
  var ids = []; for (var i=0;i<allOrders.length;i++) if (allOrders[i].status==='pending') ids.push(allOrders[i].id);
  if (!ids.length) return;
  var now = new Date().toISOString();
  try { for (var j=0;j<ids.length;j++) await fetch(API+'?id=eq.'+encodeURIComponent(ids[j]),{method:'PATCH',headers:HEADERS,body:JSON.stringify({status:'done',done_at:now})}); await loadOrders(); showToast('✅ 全部 '+ids.length+' 笔已完成'); }
  catch(e){ console.error(e); showToast('操作失败'); }
}

async function deliverAll() {
  var ids = []; for (var i=0;i<allOrders.length;i++) if (allOrders[i].status==='done') ids.push(allOrders[i].id);
  if (!ids.length) return;
  var now = new Date().toISOString();
  try { for (var j=0;j<ids.length;j++) await fetch(API+'?id=eq.'+encodeURIComponent(ids[j]),{method:'PATCH',headers:HEADERS,body:JSON.stringify({status:'delivered',delivered_at:now})}); await loadOrders(); showToast('🚀 全部 '+ids.length+' 笔已送达'); }
  catch(e){ console.error(e); showToast('操作失败'); }
}

function clearDelivered() {
  var ids = []; for (var i=0;i<allOrders.length;i++) if (allOrders[i].status==='delivered') ids.push(allOrders[i].id);
  if (!ids.length) return;
  var ov = document.createElement('div'); ov.className = 'overlay';
  ov.innerHTML = '<div class="dialog"><h3>清空所有已送达订单？</h3><p>共 '+ids.length+' 笔，不可恢复</p>'+
    '<div class="dialog-btns"><button class="btn-cancel">取消</button><button class="btn-confirm">清空</button></div></div>';
  document.body.appendChild(ov);
  ov.querySelector('.btn-cancel').onclick = function(){ ov.remove(); };
  ov.querySelector('.btn-confirm').onclick = async function(){
    ov.remove();
    try { for (var j=0;j<ids.length;j++) await fetch(API+'?id=eq.'+encodeURIComponent(ids[j]),{method:'DELETE',headers:HEADERS}); await loadOrders(); showToast('🗑 已清空'); }
    catch(e){ console.error(e); showToast('清空失败'); }
  };
  ov.addEventListener('click',function(e){ if(e.target===ov) ov.remove(); });
}

// ========== PIN ==========
function pinPress(d) { if (pinInput.length>=4) return; pinInput+=d; updatePinDots(); if (pinInput.length===4) setTimeout(checkPin,300); }
function pinDelete() { pinInput = pinInput.slice(0,-1); updatePinDots(); }
function updatePinDots() {
  var ds = document.querySelectorAll('#pinDots .pin-dot');
  for (var i=0;i<ds.length;i++) ds[i].className = i<pinInput.length?'pin-dot filled':'pin-dot';
}
function checkPin() {
  if (pinInput === PIN) {
    document.getElementById('pinScreen').style.display = 'none';
    document.getElementById('adminContent').style.display = '';
    selectedDate = dateStr(new Date()); updateDateUI();
    loadOrders().then(function(){ pollTimer = setInterval(loadOrders,3000); });
    window.addEventListener('online',function(){ updateConnStatus(true); loadOrders(); });
    window.addEventListener('offline',function(){ updateConnStatus(false); });
  } else {
    var ds = document.querySelectorAll('#pinDots .pin-dot');
    for (var i=0;i<ds.length;i++) ds[i].className = 'pin-dot wrong';
    setTimeout(function(){ pinInput=''; updatePinDots(); },600);
  }
}

// ========== 启动 ==========
function init() {
  if (IS_ADMIN) {
    document.getElementById('adminApp').style.display = '';
    document.getElementById('customerApp').style.display = 'none';
  } else {
    document.getElementById('customerApp').style.display = '';
    document.getElementById('adminApp').style.display = 'none';
    updateDateButtons(); renderFillingPills();
  }
}
init();
</script>
